name: phase4-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: threat_risk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d threat_risk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/threat_risk
      API_TEST_DATABASE_URL: postgresql://app:app@localhost:5432/threat_risk
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: threat_risk
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      DBT_PROFILES_DIR: dbt
      PYTHONPATH: services/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: services/web/package-lock.json

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx pyyaml pip-audit bandit
          pip install -r services/api/requirements.txt
          pip install dbt-core==1.8.7 dbt-postgres==1.8.2

      - name: Lint new services
        run: |
          ruff check services/api services/dashboard services/soc_producer services/soc_consumer

      - name: Security checks
        run: |
          bandit -q -r services/api/app
          pip-audit -r services/api/requirements.txt --cache-dir /tmp/pip-audit-cache

      - name: Bootstrap warehouse fixtures
        run: |
          psql "$DATABASE_URL" -f sql/init/001_init_schemas.sql
          psql "$DATABASE_URL" -f sql/init/002_soc_schema.sql
          psql "$DATABASE_URL" -f sql/init/003_auth_schema.sql
          psql "$DATABASE_URL" -f sql/init/004_soc_state.sql
          psql "$DATABASE_URL" -f sql/init/005_notify_triggers.sql
          psql "$DATABASE_URL" -f sql/init/006_auth_hardening.sql
          psql "$DATABASE_URL" -f sql/init/007_ioc_schema.sql
          psql "$DATABASE_URL" -c "insert into raw.kev (cve_id, vendor_project, product, vulnerability_name, date_added, required_action, due_date, notes, source_url, run_date) values ('CVE-2026-0001','apache','httpd','demo vuln', current_date, 'patch', current_date + 7, 'demo', 'https://www.cisa.gov', current_date) on conflict do nothing;"
          psql "$DATABASE_URL" -c "insert into raw.urlhaus_recent (url, url_status, host, date_added, threat, tags, urlhaus_link, reporter, larted, source_url, run_date) values ('http://bad.example/a','online','bad.example', now(), 'malware_download', 'demo', 'https://urlhaus.abuse.ch', 'demo', false, 'https://urlhaus.abuse.ch', current_date);"
          psql "$DATABASE_URL" -c "insert into raw.urlhaus_events (event_id, event_time, ingested_at, source, url, feed, payload, _consumer_ingested_at, _kafka_topic, _kafka_partition, _kafka_offset) values ('evt-ci-1', now() - interval '2 minutes', now() - interval '1 minute', 'urlhaus', 'http://bad.example/a', 'urlhaus', '{}'::jsonb, now() - interval '1 minute', 'threat.urlhaus.events', 0, 100) on conflict (event_id) do nothing;"

      - name: dbt build + freshness + tests
        run: |
          cd dbt
          export DBT_PROFILES_DIR=.
          dbt build
          dbt source freshness --select source:raw.urlhaus_events
          dbt test --select source:raw.urlhaus_events fct_urlhaus_threat_events

      - name: API tests
        run: |
          pytest -q services/api/tests

      - name: React SOC UI checks
        run: |
          cd services/web
          npm ci
          npm run lint
          npm run build

      - name: Phase 5 config validation
        run: |
          python -c "import json, pathlib; [json.load(open(p)) for p in pathlib.Path('infra/monitoring/grafana/dashboards').glob('*.json')]"
          python -c "import yaml; [yaml.safe_load(open(p)) for p in ['infra/monitoring/prometheus/prometheus.yml','infra/monitoring/prometheus/rules/phase5-alerts.yml','infra/monitoring/alertmanager.yml']]"
          docker compose -f docker-compose.yml -f infra/streaming/docker-compose.phase2.yml -f infra/orchestration/docker-compose.phase3.yml -f infra/consumption/docker-compose.phase4.yml -f infra/monitoring/docker-compose.phase5.yml config >/tmp/phase5-compose.yml
          docker compose -f docker-compose.yml -f infra/streaming/docker-compose.phase2.yml -f infra/orchestration/docker-compose.phase3.yml -f infra/consumption/docker-compose.phase4.yml -f infra/monitoring/docker-compose.phase5.yml -f infra/soc/docker-compose.phase6.yml config >/tmp/phase6-compose.yml
          docker compose -f docker-compose.yml -f infra/streaming/docker-compose.phase2.yml -f infra/orchestration/docker-compose.phase3.yml -f infra/consumption/docker-compose.phase4.yml -f infra/monitoring/docker-compose.phase5.yml -f infra/soc/docker-compose.phase6.yml -f infra/web/docker-compose.web.yml config >/tmp/web-compose.yml
          docker compose -f docker-compose.yml -f infra/streaming/docker-compose.phase2.yml -f infra/orchestration/docker-compose.phase3.yml -f infra/consumption/docker-compose.phase4.yml -f infra/monitoring/docker-compose.phase5.yml -f infra/soc/docker-compose.phase6.yml -f infra/soc/docker-compose.phase7.yml -f infra/web/docker-compose.web.yml config >/tmp/phase7-compose.yml
          docker compose -f docker-compose.yml -f infra/streaming/docker-compose.phase2.yml -f infra/orchestration/docker-compose.phase3.yml -f infra/consumption/docker-compose.phase4.yml -f infra/monitoring/docker-compose.phase5.yml -f infra/soc/docker-compose.phase6.yml -f infra/soc/docker-compose.phase7.yml -f infra/soc/docker-compose.phase8.yml -f infra/web/docker-compose.web.yml config >/tmp/phase8-compose.yml
