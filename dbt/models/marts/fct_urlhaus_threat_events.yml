version: 2

models:
  - name: fct_urlhaus_threat_events
    description: "Incremental streaming fact table for URLhaus threat events consumed by the API, dashboard, SLO metrics, and replay validation."
    columns:
      - name: event_id
        description: "Globally unique event identifier generated by the producer."
        tests:
          - not_null
          - unique
      - name: event_time
        description: "Timestamp of the threat event from the source payload."
        tests:
          - not_null
      - name: ingested_at
        description: "Timestamp when the event entered the platform."
        tests:
          - not_null
      - name: source
        description: "Source system for the event. Expected to be urlhaus."
        tests:
          - not_null
          - accepted_values:
              values: ["urlhaus"]
      - name: url
        description: "Malicious URL observed in the event payload."
        tests:
          - not_null
      - name: feed
        description: "Source feed label from the event payload."
