server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ───────────────────────────────────────────────────────
  # Content-Security-Policy:
  #   default-src 'self'          → only same-origin resources by default
  #   script-src  'self'          → no inline scripts, no CDN JS
  #   style-src   'self' 'unsafe-inline' → Vite injects inline styles; tighten
  #                                         once a nonce/hash strategy is in place
  #   connect-src 'self' ws: wss: → allow WebSocket upgrades from the SPA
  #   img-src     'self' data:    → data URIs used by some chart libs
  #   font-src    'self'
  #   object-src  'none'          → block Flash / plugins entirely
  #   frame-ancestors 'none'      → equivalent to X-Frame-Options: DENY
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none';"
    always;

  # Belt-and-suspenders clickjacking protection (redundant with CSP above)
  add_header X-Frame-Options "DENY" always;
  # Prevent MIME-type sniffing
  add_header X-Content-Type-Options "nosniff" always;
  # Force HTTPS if already on TLS (safe to add; browsers ignore on plain HTTP)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /api/ {
    proxy_pass http://api:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket upgrade support (used by /api/v1/soc/stream)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
