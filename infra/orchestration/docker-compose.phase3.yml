services:
  prefect-server:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_URL: http://localhost:4200
    volumes:
      - ./:/opt/project
      - prefect_data:/root/.prefect

  prefect-worker:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    command: /bin/sh -c "prefect work-pool create local-process --type process || true && prefect worker start --pool local-process --type process"
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC: threat.urlhaus.events
      GROUP_ID: threat-risk-consumer
      DBT_PROFILES_DIR: /opt/project/dbt
    volumes:
      - ./:/opt/project
      - prefect_data:/root/.prefect
    restart: unless-stopped

  prefect-cli:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC: threat.urlhaus.events
      GROUP_ID: threat-risk-consumer
      DBT_PROFILES_DIR: /opt/project/dbt
    volumes:
      - ./:/opt/project
      - prefect_data:/root/.prefect

volumes:
  prefect_data:
