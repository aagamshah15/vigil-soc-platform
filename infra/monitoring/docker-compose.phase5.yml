services:
  api:
    environment:
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-false}
      API_KEY: ${API_KEY:-}
      API_RATE_LIMIT_ENABLED: ${API_RATE_LIMIT_ENABLED:-true}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-120}
      MAX_STREAM_LAG_MINUTES: ${MAX_STREAM_LAG_MINUTES:-15}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  dashboard:
    environment:
      DASHBOARD_PHASE_LABEL: "Phase 5: Production Readiness + Governance"

  prometheus:
    image: prom/prometheus:v2.55.1
    platform: linux/arm64
    depends_on:
      api:
        condition: service_healthy
      alertmanager:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    platform: linux/arm64
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  alert-log:
    image: python:3.11-alpine
    platform: linux/arm64
    working_dir: /app
    command: ["python", "/app/alert_sink.py"]
    volumes:
      - ./scripts/alert_sink.py:/app/alert_sink.py:ro
    ports:
      - "9094:8080"

  grafana:
    image: grafana/grafana:11.3.1
    platform: linux/arm64
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  prometheus_data:
  grafana_data:
